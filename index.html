<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dexsty Shop - Roblox Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GIỮ NGUYÊN CSS CỦA NÍ */
        #customAlert.modal { display: none; }
        .alert-content { background: #0f172a; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; border: 2px solid #38bdf8; text-align: center; }
        :root { --bg: #030712; --card: rgba(17, 24, 39, 0.85); --sky: #38bdf8; --gold: #fbbf24; --hot: #ff4757; --success: #22c55e; --text: #f8fafc; }
        body { margin: 0; padding-bottom: 80px; color: var(--text); font-family: 'Inter', sans-serif; background: linear-gradient(-45deg, #030712, #0f172a, #030712, #1e1b4b); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .navbar { background: rgba(17, 24, 39, 0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(56, 189, 248, 0.2); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo-container { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 45px; width: auto; object-fit: contain; margin-right: 10px; mix-blend-mode: screen; filter: brightness(1.2); }
        .logo-text { font-size: 18px; font-weight: 900; color: var(--sky); }
        .container { padding: 0 5%; max-width: 1200px; margin: auto; }
        .section-title { margin: 30px 0 15px; color: var(--sky); font-weight: 800; text-transform: uppercase; font-size: 16px; border-left: 4px solid var(--sky); padding-left: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; position: relative; transition: 0.3s; overflow: hidden; }
        .card img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .price { color: var(--gold); font-weight: 900; font-size: 16px; margin-bottom: 12px; }
        .btn-buy { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid var(--sky); background: transparent; color: var(--sky); font-weight: 700; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #111827; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--sky); text-align: center; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .auth-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #030712; padding: 5px; border-radius: 10px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 13px; color: #64748b; transition: 0.3s; }
        .auth-tab.active { background: var(--sky); color: #000; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #1f2937; background: #030712; color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; background: var(--sky); color: #000; font-weight: 800; cursor: pointer; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-sm { padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; border: none; }
        .btn-login { background: var(--sky); color: #000; }
        .btn-logout { background: #ff4757; color: #fff; }
        .btn-deposit { background: #22c55e; color: #fff; }

        /* CSS CHO BẢNG TOP NẠP */
        .top-deposit-card { background: var(--card); border: 1px solid rgba(56, 189, 248, 0.1); border-radius: 15px; padding: 10px; margin-bottom: 20px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-row:last-child { border: none; }
        .rank { font-weight: 900; width: 30px; }
        .rank-1 { color: var(--gold); }
        .user-name { flex: 1; color: #cbd5e1; font-size: 14px; }
        .amount { color: var(--success); font-weight: 700; }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; gap: 10px; } .logo-text { display: none; } }
    </style>
</head>
<body>

<div id="customAlert" class="modal">
    <div class="modal-content" id="alertBox" style="border-color: #ff4757; max-width: 320px;">
        <div id="alertIcon" style="font-size: 40px; color: #ff4757; margin-bottom: 15px;"><i class="fas fa-exclamation-circle"></i></div>
        <h3 id="alertTitle" style="color: #ff4757; margin-bottom: 10px;">THÔNG BÁO</h3>
        <p id="alertMessage" style="color: #cbd5e1; font-size: 15px; line-height: 1.5;"></p>
        <button id="alertBtn" class="btn-submit" style="background: #ff4757; color: white; margin-top: 20px;" onclick="window.closeModal('customAlert')">Đã Hiểu</button>
    </div>
</div>

<div id="depositModal" class="modal">
    <div class="modal-content" style="max-width: 350px;">
        <h3 style="color: #22c55e;">NẠP TIỀN QUA VIETQR</h3>
        <div style="background: white; padding: 10px; border-radius: 10px; margin: 15px 0;">
            <img id="qrImg" src="https://img.vietqr.io/image/vietcombank-1044627277-compact.jpg?accountName=DEXSTY%20SHOP" style="width: 100%; height: auto;">
        </div>
        <p style="font-size: 13px; color: #cbd5e1;">Nội dung CK: <b id="depositMsg" style="color: var(--gold);">Đang tải...</b></p>
        <button class="btn-submit" style="background: #22c55e; color: white;" onclick="window.sendDepositWebhook()">XÁC NHẬN ĐÃ CHUYỂN</button>
        <p style="color:gray; font-size:11px; margin-top:15px; cursor:pointer;" onclick="window.closeModal('depositModal')">ĐÓNG</p>
    </div>
</div>

<nav class="navbar">
    <a href="#" class="logo-container">
        <img src="https://i.imgur.com/8CLFc5h.jpeg" class="logo-img">
        <span class="logo-text">DEXSTY SHOP</span>
    </a>
    <div id="auth-ui" class="nav-right"></div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active" onclick="window.setAuthMode('login')">ĐĂNG NHẬP</div>
            <div id="tab-register" class="auth-tab" onclick="window.setAuthMode('register')">ĐĂNG KÝ</div>
        </div>
        <input type="email" id="email" placeholder="Email...">
        <input type="password" id="password" placeholder="Mật khẩu...">
        <button id="auth-btn-text" class="btn-submit" onclick="window.processAuth()">XÁC NHẬN ĐĂNG NHẬP</button>
        <p style="color:gray; font-size:11px; margin-top:15px; cursor:pointer;" onclick="window.closeModal('authModal')">ĐÓNG</p>
    </div>
</div>

<div class="container">
    <div class="section-title">🏆 Top Nạp Đại Gia</div>
    <div id="top-deposit-list" class="top-deposit-card">
        <div style="text-align: center; color: gray; padding: 10px;">Đang tải bảng xếp hạng...</div>
    </div>

    <div class="section-title">⚔️ Game Pass Vĩnh Viễn</div>
    <div id="gp-grid" class="grid"></div>
    <div class="section-title">🍎 Trái Ác Quỷ Vĩnh Viễn (48 Trái)</div>
    <div id="fruit-grid" class="grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, get, update, query, orderByChild, limitToLast, increment } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAodrFbbkBhdSWA7oY_qz4FnoRUpQpsJls",
        authDomain: "dexsty-shop-f955d.firebaseapp.com",
        databaseURL: "https://dexsty-shop-f955d-default-rtdb.firebaseio.com",
        projectId: "dexsty-shop-f955d",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const rtdb = getDatabase(app);

    window.rtdb = rtdb;
    window.ref = ref;
    window.set = set;
    window.get = get;
    window.update = update;
    window.increment = increment;

    window.openAuthModal = () => document.getElementById('authModal').style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.showAlert = (msg, isSuccess = false) => {
        const box = document.getElementById('alertBox');
        const icon = document.getElementById('alertIcon');
        const title = document.getElementById('alertTitle');
        const btn = document.getElementById('alertBtn');
        const message = document.getElementById('alertMessage');
        const color = isSuccess ? "#22c55e" : "#ff4757";
        box.style.borderColor = color;
        title.style.color = color;
        title.innerText = isSuccess ? "THÀNH CÔNG" : "THÔNG BÁO";
        icon.style.color = color;
        icon.innerHTML = isSuccess ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
        btn.style.background = color;
        message.innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
    };

    window.openDeposit = () => {
        if(!auth.currentUser) return window.openAuthModal();
        document.getElementById('depositMsg').innerText = "NAP " + auth.currentUser.email;
        document.getElementById('depositModal').style.display = 'flex';
    };

    window.sendDepositWebhook = async () => {
        const user = auth.currentUser;
        if(!user) return;
        const depositContent = "NAP " + user.email;
        const webhookDeposit = "https://discord.com/api/webhooks/1486075383743905925/GtoDjx9Kic9kwZmfe1kW8mOXtpzd7z9H7O3U00oreOJ6-BiWBwyMz5nvlFRiLxgGCs-U";
        
        try {
            await fetch(webhookDeposit, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "Dexsty Shop - NẠP TIỀN",
                    avatar_url: "https://i.imgur.com/8CLFc5h.jpeg",
                    embeds: [{
                        title: "💰 YÊU CẦU NẠP TIỀN MỚI!",
                        color: 2278750,
                        fields: [
                            { name: "👤 Khách hàng", value: user.email, inline: true },
                            { name: "📝 Nội dung CK", value: depositContent, inline: true },
                            { name: "🆔 UID", value: user.uid, inline: false }
                        ],
                        footer: { text: "Vui lòng check bank và cộng tiền cho khách" },
                        timestamp: new Date().toISOString()
                    }]
                })
            });
            window.closeModal('depositModal');
            showAlert("Đã gửi yêu cầu nạp tiền! Vui lòng đợi shop kiểm tra nhé ní.", true);
        } catch (e) { showAlert("Lỗi gửi yêu cầu: " + e.message); }
    };

    let authMode = 'login';
    window.setAuthMode = (mode) => {
        authMode = mode;
        document.getElementById('tab-login').className = `auth-tab ${mode === 'login' ? 'active' : ''}`;
        document.getElementById('tab-register').className = `auth-tab ${mode === 'register' ? 'active' : ''}`;
        document.getElementById('auth-btn-text').innerText = mode === 'login' ? 'XÁC NHẬN ĐĂNG NHẬP' : 'XÁC NHẬN ĐĂNG KÝ';
    };

    window.processAuth = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        if(!e || !p) return showAlert("Nhập đủ thông tin ní ơi!");
        try {
            if(authMode === 'login') await signInWithEmailAndPassword(auth, e, p);
            else {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                // Khởi tạo cả balance và totalDeposit khi đăng ký mới
                await set(ref(rtdb, 'users/' + res.user.uid), { balance: 0, totalDeposit: 0, email: e });
            }
            window.closeModal('authModal');
        } catch (err) { showAlert(err.message); }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (u) => {
        const ui = document.getElementById('auth-ui');
        if(u) {
            onValue(ref(rtdb, 'users/' + u.uid), (s) => {
                const b = s.val()?.balance || 0;
                ui.innerHTML = `
                    <button class="btn-sm btn-deposit" onclick="window.openDeposit()">Nạp Tiền</button>
                    <b style="color:var(--gold); font-size:16px;">${Number(b).toLocaleString()}đ</b>
                    <button class="btn-sm btn-logout" onclick="window.logout()">Thoát</button>`;
            });
        } else { ui.innerHTML = `<button class="btn-sm btn-login" onclick="window.openAuthModal()">Đăng nhập / Đăng ký</button>`; }
    });

    // HÀM LOAD BẢNG XẾP HẠNG
    function loadTopDeposit() {
        const topRef = query(ref(rtdb, 'users'), orderByChild('totalDeposit'), limitToLast(5));
        onValue(topRef, (snapshot) => {
            const listArea = document.getElementById('top-deposit-list');
            const data = snapshot.val();
            if(!data) {
                listArea.innerHTML = '<div style="text-align:center; color:gray; padding:10px;">Chưa có dữ liệu xếp hạng.</div>';
                return;
            }

            const sorted = Object.entries(data)
                .map(([id, val]) => ({ id, ...val }))
                .filter(u => u.totalDeposit > 0)
                .sort((a, b) => b.totalDeposit - a.totalDeposit);

            if(sorted.length === 0) {
                listArea.innerHTML = '<div style="text-align:center; color:gray; padding:10px;">Hãy là người đầu tiên lên Top!</div>';
                return;
            }

            listArea.innerHTML = '';
            sorted.forEach((u, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
                const name = u.email ? u.email.split('@')[0] : "User";
                listArea.innerHTML += `
                    <div class="top-row">
                        <div>
                            <span class="rank ${i<3?'rank-1':''}">${medal}</span>
                            <span class="user-name">${name}***</span>
                        </div>
                        <div class="amount">${(u.totalDeposit || 0).toLocaleString()}đ</div>
                    </div>
                `;
            });
        });
    }

        {n: "x2 Drop Chance", p: 55000, t: "gp", i: "https://tr.rbxcdn.com/f04746688b150937c449197992985868/150/150/Image/Png"},
        {n: "Dragon", p: 700000, t: "f", i: "https://i.imgur.com/hd885Pk.jpeg"},
        {n: "Kitsune", p: 574000, t: "f", i: "https://i.imgur.com/VT4sDLv.jpeg"},

    ];

    window.buyItem = async (n, p) => {
        if(!auth.currentUser) return window.openAuthModal();
        try {
            const userRef = window.ref(window.rtdb, 'users/' + auth.currentUser.uid);
            const snapshot = await window.get(userRef);
            const b = snapshot.val()?.balance || 0;
            if(b < p) return showAlert(`Số dư không đủ! Cần thêm ${(p - b).toLocaleString()}đ nữa.`);
            if(confirm(`Ní chắc chắn muốn mua ${n} giá ${p.toLocaleString()}đ?`)) {
                const nb = b - p;
                await window.update(userRef, { balance: nb });
                const orderId = Date.now();
                await window.set(window.ref(window.rtdb, 'orders/' + orderId), { 
                    uid: auth.currentUser.uid, 
                    email: auth.currentUser.email, 
                    item: n, 
                    price: p,
                    status: "Chờ phát đồ"
                });
